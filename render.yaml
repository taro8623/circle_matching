databases:
  - name: circle-matching-db
    databaseName: circle_matching
    user: circle_matching
    plan: free

services:
  - type: web
    name: circle-matching-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: bash start_render.sh
    healthCheckPath: /health
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: circle-matching-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PUBLIC_SIGNUP_ENABLED
        value: "false"
      - key: DEMO_USER_PASSWORD
        value: "CircleDemo2026!"
      - key: DEMO_CIRCLE_NAME
        value: "Circle Matching Demo"
      - key: DEMO_CIRCLE_JOIN_PASSWORD
        value: "circle-demo"
      - key: CORS_ALLOW_ORIGINS
        value: "https://circle-matching-web.onrender.com"

  - type: web
    name: circle-matching-web
    runtime: static
    rootDir: circle-matching-frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: "https://circle-matching-api.onrender.com"
      - key: VITE_PUBLIC_SIGNUP_ENABLED
        value: "false"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
